<div class="register-page">
  <div class="register-card">
    <div class="formulario">
      <h2>Crear cuenta</h2>
      <p class="subtitle">Únete a la familia Killa y descubre cuentos mágicos</p>

      <form [formGroup]="registerForm" (ngSubmit)="registrar()" novalidate>
        <div class="row">
          <div class="field">
            <label for="nombre">Nombre</label>
            <input id="nombre" formControlName="nombre" type="text" placeholder="Tu nombre"
              aria-describedby="nombre-error" />
            <app-form-error [control]="registerForm.get('nombre')" [isSubmitted]="isSubmitted" fieldLabel="el nombre"
              errorId="nombre-error"></app-form-error>
          </div>
          <div class="field">
            <label for="apellido">Apellido</label>
            <input id="apellido" formControlName="apellido" type="text" placeholder="Tu apellido"
              aria-describedby="apellido-error" />
            <app-form-error [control]="registerForm.get('apellido')" [isSubmitted]="isSubmitted"
              fieldLabel="el apellido" errorId="apellido-error"></app-form-error>
          </div>
        </div>

        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="input-icon">
            <span class="icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </span>
            <input id="email" formControlName="email" type="email" placeholder="correo&#64;ejemplo.com"
              aria-describedby="email-help email-error" />
          </div>
          <app-form-help id="email-help"
            text="Usaremos este correo para confirmar tu cuenta y tus pedidos."></app-form-help>
          <app-form-error [control]="registerForm.get('email')" [isSubmitted]="isSubmitted"
            fieldLabel="el correo electrónico" errorId="email-error"></app-form-error>
        </div>

        <div class="field">
          <label for="telefono">Teléfono</label>
          <div class="input-icon">
            <span class="icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect>
                <line x1="12" y1="18" x2="12.01" y2="18"></line>
              </svg>
            </span>
            <input id="telefono" formControlName="telefono" type="tel" placeholder="999 999 999" maxlength="9"
              aria-describedby="telefono-help telefono-error" />
          </div>
          <app-form-help id="telefono-help"
            text="Incluye un número de 9 dígitos para coordinar la entrega."></app-form-help>
          <app-form-error [control]="registerForm.get('telefono')" [isSubmitted]="isSubmitted" fieldLabel="el teléfono"
            errorId="telefono-error"></app-form-error>
          <span class="hint"
            *ngIf="registerForm.get('telefono')?.hasError('pattern') && registerForm.get('telefono')?.touched">
            Ingresa 9 dígitos
          </span>
        </div>

        <div class="row">
          <div class="field field-sm">
            <label for="documentoTipo">Tipo Doc.</label>
            <select id="documentoTipo" formControlName="documentoTipo">
              <option *ngFor="let t of tiposDocumento" [value]="t.codigo">{{ getTipoDocumentoLabel(t) }}</option>
            </select>
            <app-form-help id="documento-tipo-help"
              text="Selecciona el tipo de documento para continuar con tu registro."></app-form-help>
          </div>
          <div class="field">
            <label for="documentoNumero">Nro. Documento <span class="optional">(opcional)</span></label>
            <input id="documentoNumero" formControlName="documentoNumero" type="text"
              [placeholder]="documentoPlaceholder" [attr.maxlength]="docMaxLength" />
            <span class="hint">{{ documentoHelpText }}</span>
            <span class="hint error-hint"
              *ngIf="registerForm.get('documentoNumero')?.touched && registerForm.get('documentoNumero')?.invalid">
              {{ documentoErrorMessage }}
            </span>
          </div>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-icon">
            <span class="icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input id="password" formControlName="password" [type]="showPassword ? 'text' : 'password'"
              placeholder="Mínimo 6 caracteres" aria-describedby="password-help password-error" />
            <button type="button" class="toggle-pw" (click)="togglePassword()" tabindex="-1">
              <svg *ngIf="showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                </path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
              <svg *ngIf="!showPassword" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <app-form-help id="password-help" text="Usa al menos 6 caracteres para proteger tu cuenta."></app-form-help>
          <app-form-error [control]="registerForm.get('password')" [isSubmitted]="isSubmitted"
            fieldLabel="la contraseña" errorId="password-error"></app-form-error>
        </div>

        <div class="field">
          <label for="confirmarPassword">Confirmar contraseña</label>
          <div class="input-icon">
            <span class="icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input id="confirmarPassword" formControlName="confirmarPassword"
              [type]="showConfirmPassword ? 'text' : 'password'" placeholder="Repite tu contraseña"
              aria-describedby="confirm-password-error" />
            <button type="button" class="toggle-pw" (click)="toggleConfirmPassword()" tabindex="-1">
              <svg *ngIf="showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
                </path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
              <svg *ngIf="!showConfirmPassword" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <app-form-error [control]="registerForm.get('confirmarPassword')" [isSubmitted]="isSubmitted"
            fieldLabel="la confirmación de contraseña" errorId="confirm-password-error"></app-form-error>
          <span class="hint error-hint" *ngIf="passwordMismatch && registerForm.get('confirmarPassword')?.touched">
            Las contraseñas no coinciden
          </span>
        </div>

        <div class="error-box" *ngIf="error" aria-live="polite">
          <span>&#x26a0;&#xfe0f;</span> {{ error }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          <span *ngIf="!isLoading">Crear mi cuenta</span>
          <span *ngIf="isLoading" class="spinner"></span>
        </button>
      </form>

      <p class="login-link">
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </p>
    </div>

    <div class="ilustracion">
      <img appLazyLoad="/assets/libros_killa.png" alt="Cuentos de Killa" />
      <p class="ilu-text">Cuentos que conectan con la cultura peruana</p>
    </div>
  </div>
</div>
