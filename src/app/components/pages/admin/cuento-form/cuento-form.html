<div class="form-container">
  <h2>{{ isEditMode ? 'Editar Cuento' : 'Nuevo Cuento' }}</h2>

  <form [formGroup]="cuentoForm" (ngSubmit)="guardar()" class="cuento-form">
    <div class="campos-basicos">
      <label>
        Título
        <input type="text" formControlName="titulo" required />
      </label>
      <label>
        Autor
        <input type="text" formControlName="autor" required />
      </label>
      <label class="descripcion">
        Descripción
        <textarea formControlName="descripcionCorta" required></textarea>
      </label>
      <label>
        Editorial
        <input type="text" formControlName="editorial" />
      </label>
      <label>
        Categoría *
        <select formControlName="categoria" required>
          <option value="">Selecciona una categoría</option>
          <option *ngFor="let categoria of categorias" [value]="categoria.codigo">{{ categoria.valor }}</option>
        </select>
        <small class="error-mensaje" *ngIf="cuentoForm.get('categoria')?.invalid && cuentoForm.get('categoria')?.touched">
          La categoría es obligatoria.
        </small>
      </label>
      <label>
        Tipo de Edición
        <select formControlName="tipoEdicion">
          <option value="">Selecciona tipo de edición</option>
          <option *ngFor="let tipo of tiposEdicion" [value]="tipo.codigo">{{ tipo.valor }}</option>
        </select>
      </label>
      <label>
        Número de Páginas
        <input type="number" formControlName="nroPaginas" required />
      </label>
      <label>
        Fecha de Publicación
        <input type="date" formControlName="fechaPublicacion" />
      </label>
      <label>
        Edad Recomendada
        <select formControlName="edadRecomendada">
          <option value="">Selecciona rango de edad</option>
          <option *ngFor="let edad of edades" [value]="edad.codigo">{{ edad.valor }}</option>
        </select>
      </label>
      <label>
        Stock
        <input type="number" formControlName="stock" required />
      </label>
      <label>
        Precio
        <input type="number" formControlName="precio" required />
      </label>
      <label class="imagen">
        Imagen
        <input type="file" (change)="onFileChange($event)" />
      </label>
      <img *ngIf="imagePreview" [src]="imagePreview" class="preview" alt="Vista previa de la imagen" />
    </div>

    <div class="error-mensaje" *ngIf="errorMensaje">{{ errorMensaje }}</div>

    <div class="acciones">
      <button type="submit" class="btn btn-primary">{{ isEditMode ? 'Actualizar' : 'Crear' }}</button>
      <button type="button" class="btn btn-danger" (click)="cancelar()">Cancelar</button>
    </div>
  </form>
</div>
