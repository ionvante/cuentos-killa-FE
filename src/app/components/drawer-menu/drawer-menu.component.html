<!-- Drawer sidebar — Redesigned with user avatar and organized sections -->
<div class="drawer" [class.open]="drawer.isOpen$ | async" role="navigation">
  <!-- User profile header -->
  <header class="drawer-profile">
    <div class="profile-blob"></div>
    <div class="profile-info" *ngIf="user">
      <div class="avatar">
        <span>{{ user.nombre.charAt(0) || 'K' }}</span>
      </div>
      <div class="profile-text">
        <h3 class="profile-name">Hola, {{ user.nombre }}!</h3>
        <p class="profile-role">{{ user.role === 'ADMIN' ? 'Administrador' : 'Lector Explorador' }}</p>
      </div>
    </div>
    <div class="profile-info" *ngIf="!user">
      <div class="avatar">
        <span>K</span>
      </div>
      <div class="profile-text">
        <h3 class="profile-name">Cuentos de Killa</h3>
        <p class="profile-role">Bienvenido</p>
      </div>
    </div>
    <button class="close-btn" (click)="close()" aria-label="Cerrar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </header>

  <!-- Navigation links -->
  <nav class="drawer-nav">
    <!-- Primary links -->
    <div class="nav-section">
      <a routerLink="/home" (click)="close()" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Inicio</span>
      </a>
      <a routerLink="/cuentos" (click)="close()" class="nav-item">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        <span>Cuentos</span>
      </a>
    </div>

    <!-- Divider -->
    <div class="nav-divider"></div>

    <!-- Secondary links -->
    <div class="nav-section">
      <a routerLink="/pedidos" (click)="close()" class="nav-item secondary" *ngIf="user">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
          <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
          <line x1="12" y1="22.08" x2="12" y2="12" />
        </svg>
        <span>Mis Pedidos</span>
        <span class="nav-badge" *ngIf="itemCount > 0">{{ itemCount }}</span>
      </a>
      <a routerLink="/perfil" (click)="close()" class="nav-item secondary" *ngIf="user">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
        <span>Mi Perfil</span>
      </a>
      <a routerLink="/direcciones" (click)="close()" class="nav-item secondary" *ngIf="user">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
          <circle cx="12" cy="10" r="3" />
        </svg>
        <span>Direcciones</span>
      </a>
      <a routerLink="/pagos" (click)="close()" class="nav-item secondary" *ngIf="user">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="14" x="2" y="5" rx="2" />
          <line x1="2" y1="10" x2="22" y2="10" />
        </svg>
        <span>Historial de pagos</span>
      </a>
      <a routerLink="/admin/dashboard" (click)="close()" class="nav-item secondary" *ngIf="user?.role === 'ADMIN'">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect width="7" height="7" x="3" y="3" rx="1" />
          <rect width="7" height="7" x="14" y="3" rx="1" />
          <rect width="7" height="7" x="14" y="14" rx="1" />
          <rect width="7" height="7" x="3" y="14" rx="1" />
        </svg>
        <span>Panel Admin</span>
      </a>
      <a routerLink="/login" (click)="close()" class="nav-item secondary" *ngIf="!user">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
          <polyline points="10 17 15 12 10 7" />
          <line x1="15" y1="12" x2="3" y2="12" />
        </svg>
        <span>Iniciar sesión</span>
      </a>
    </div>
  </nav>

  <!-- Footer -->
  <div class="drawer-footer" *ngIf="user">
    <button class="logout-btn" (click)="logout()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
      Cerrar Sesión
    </button>
  </div>


</div>

<button class="drawer-backdrop" [class.show]="drawer.isOpen$ | async" (click)="close()"
  aria-label="Cerrar menú"></button>
