<!-- Hero Banner — Landing interactiva con suscripción y animaciones -->
<section class="hero-container" role="banner" aria-label="Los Cuentos de Killa">
  <!-- Decorative blobs -->
  <div class="hero-blob blob-1"></div>
  <div class="hero-blob blob-2"></div>
  <div class="hero-blob blob-3"></div>

  <div class="hero-content">
    <!-- Illustrated book visual -->
    <div class="hero-visual">
      <div class="book-card">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" class="book-icon">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
      </div>
      <div class="floating-circle circle-accent"></div>
      <div class="floating-circle circle-secondary"></div>
    </div>

    <h2 class="hero-title">Descubre un mundo mágico de cuentos</h2>
    <p class="hero-subtitle">
      Suscríbete y obtén <strong>10% de descuento</strong> en tu primera compra.
    </p>

    <!-- Email subscription -->
    <div class="subscribe-wrapper">
      <div class="subscribe-field">
        <input type="email" placeholder="Tu correo electrónico" class="subscribe-input"
          aria-label="Correo electrónico para suscripción" />
        <button class="subscribe-btn" (click)="irACuentos()">
          Suscribirme
        </button>
      </div>
    </div>
  </div>
</section>
