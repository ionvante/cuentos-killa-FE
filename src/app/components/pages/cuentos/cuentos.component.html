<div class="cuentos-container">
  <app-breadcrumb></app-breadcrumb>

  <div class="catalog-header">
    <div class="header-titles">
      <h2>Últimos cuentos</h2>
      <p class="subtitle">Historias recién llegadas a nuestra biblioteca mágica.</p>
    </div>
    <a class="cta-link" href="#">¿No sabes dónde empezar? <span>→ Ver los 5 más leídos</span></a>
  </div>

  <div class="filter-bar">
    <button class="btn-filtrar" type="button">
      <svg viewBox="0 0 24 24" class="icon-filter" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
      </svg>
      Filtrar
    </button>

    <div class="select-wrapper">
      <select [(ngModel)]="categoriaFilter" (ngModelChange)="onFilterChange()">
        <option value="">Categoría</option>
        <option *ngFor="let c of categorias" [value]="c.codigo">{{ c.valor }}</option>
      </select>
    </div>

    <div class="select-wrapper">
      <select [(ngModel)]="edadFilter" (ngModelChange)="onFilterChange()">
        <option value="">Edad</option>
        <option *ngFor="let e of edades" [value]="e.codigo">{{ e.valor }}</option>
      </select>
    </div>

    <div class="select-wrapper">
      <select [(ngModel)]="precioFilter" (ngModelChange)="onFilterChange()">
        <option value="">Precio</option>
        <option value="lt10">Menos de S/10</option>
        <option value="10-20">S/10 - S/20</option>
        <option value="gt20">Más de S/20</option>
      </select>
    </div>

    <button *ngIf="categoriaFilter || edadFilter || precioFilter" class="btn-limpiar" type="button"
      (click)="limpiarFiltros()">Limpiar</button>

    <div class="filter-spacer"></div>
    <a class="ver-todo-link" href="#">Ver todo</a>
  </div>

  <div class="grid-cuentos" *ngIf="isLoading">
    <!-- Repetir esqueletos mientras se cargan los datos -->
    <app-skeleton *ngFor="let i of [1,2,3,4,5,6,7,8]"></app-skeleton>
  </div>

  <div class="grid-cuentos" *ngIf="!isLoading">
    <app-cuento-card *ngFor="let cuento of cuentos" [cuento]="cuento"
      (agregar)="agregarAlCarrito($event)"></app-cuento-card>
  </div>

  <div class="no-results" *ngIf="!isLoading && cuentos.length === 0">
    <span class="icon">⚠</span>
    <span>¡Uy! No encontramos historias con esos filtros. Intenta con otros.</span>
  </div>

  <!-- RM-01: Paginación server-side -->
  <div class="pagination" *ngIf="!isLoading && totalPages > 1">
    <button class="page-btn" [disabled]="currentPage === 0" (click)="irAPagina(currentPage - 1)">‹</button>
    <button class="page-btn" *ngFor="let p of pages" [class.active]="p === currentPage" (click)="irAPagina(p)">
      {{ p + 1 }}
    </button>
    <button class="page-btn" [disabled]="currentPage === totalPages - 1" (click)="irAPagina(currentPage + 1)">›</button>
  </div>
</div>
