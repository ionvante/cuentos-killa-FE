<ng-template #content>
  <div class="upload-zone" (click)="triggerFileInput()" [class.has-file]="selectedFile">
    <input type="file" #fileInput id="voucherFile" accept="image/png,image/jpeg,application/pdf"
      (change)="onFileSelected($event)" hidden>

    <!-- No file selected -->
    <div *ngIf="!selectedFile" class="upload-placeholder">
      <div class="upload-icon-circle">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#A66E38" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
      </div>
      <p class="upload-text">Toca para elegir archivo</p>
      <p class="upload-formats">PDF, JPG o PNG · Máx. 5 MB</p>
    </div>

    <!-- File selected: preview -->
    <div *ngIf="selectedFile" class="upload-preview">
      <img *ngIf="isImage && previewUrl" [src]="previewUrl | safe" alt="Vista previa" class="preview-thumb" />
      <div *ngIf="isPdf" class="pdf-badge">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#d32f2f" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        PDF
      </div>
      <span class="file-name">{{ selectedFile.name }}</span>
      <button class="change-file" type="button" (click)="$event.stopPropagation(); triggerFileInput()">Cambiar</button>
    </div>
  </div>
</ng-template>

<!-- Desktop modal -->
<app-modal *ngIf="!isMobile" title="Subir comprobante" (close)="onClose()">
  <ng-container *ngTemplateOutlet="content"></ng-container>
  <div modal-footer>
    <button class="btn-upload" (click)="uploadVoucher()" [disabled]="!selectedFile || isUploading">
      <span *ngIf="!isUploading">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        Subir comprobante
      </span>
      <span *ngIf="isUploading" class="loading-text">
        <span class="spinner"></span> Subiendo...
      </span>
    </button>
  </div>
</app-modal>

<!-- Mobile drawer -->
<div *ngIf="isMobile" class="drawer-wrapper">
  <div class="voucher-drawer open">
    <header class="drawer-header">
      <h3>📸 Subir comprobante</h3>
      <button class="close-btn" (click)="onClose()" aria-label="Cerrar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </header>
    <div class="drawer-body">
      <ng-container *ngTemplateOutlet="content"></ng-container>
    </div>
    <div class="drawer-footer">
      <button class="btn-upload" (click)="uploadVoucher()" [disabled]="!selectedFile || isUploading">
        <span *ngIf="!isUploading">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Subir comprobante
        </span>
        <span *ngIf="isUploading" class="loading-text">
          <span class="spinner"></span> Subiendo...
        </span>
      </button>
    </div>
  </div>
  <button class="drawer-backdrop show" (click)="onClose()" aria-label="Cerrar"></button>
</div>
