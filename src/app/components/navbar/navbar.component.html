<nav class="navbar" role="navigation" aria-label="Navegación principal">
  <!-- Brand -->
  <a class="navbar-brand" routerLink="/home">
    <svg class="brand-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
    </svg>
    <span class="brand-text">Cuentos de Killa</span>
  </a>

  <!-- Desktop nav links -->
  <ul class="nav-links">
    <li>
      <a routerLink="/home" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        Inicio
      </a>
    </li>
    <li>
      <a routerLink="/cuentos" routerLinkActive="active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
        </svg>
        Cuentos
      </a>
    </li>
    <li *ngIf="user?.role === 'ADMIN'">
      <a routerLink="/admin/dashboard" routerLinkActive="active">Admin</a>
    </li>
  </ul>

  <!-- Search -->
  <form class="search-form" (submit)="onSearch($event)" aria-label="Buscar">
    <div class="search-wrapper">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="search" placeholder="Busca cuentos, juegos o categorías..." [ngModel]="searchQuery"
        (ngModelChange)="onSearchInput($event)" (blur)="hideDropdown()" autocomplete="off" name="q"
        aria-label="Buscar por título o autor" />

      <div class="typeahead-dropdown" *ngIf="showDropdown">
        <ul class="typeahead-list">
          <li *ngFor="let result of searchResults" (mousedown)="selectResult(result)">
            <img [src]="result.imagenUrl || 'assets/placeholder-cuento.jpg'" alt="{{result.titulo}}">
            <div class="info">
              <span class="title">{{ result.titulo }}</span>
              <span class="author">{{ result.autor }}</span>
            </div>
          </li>
        </ul>
      </div>
    </div>
  </form>

  <!-- Right section -->
  <div class="nav-right">
    <!-- Cart -->
    <button class="cart-btn" (click)="abrirCarrito()" aria-label="Carrito">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>
      <span class="cart-badge" *ngIf="cantidadTotalItems > 0">{{ cantidadTotalItems }}</span>
    </button>

    <div class="nav-divider"></div>

    <!-- Login button (not logged in) -->
    <button *ngIf="!user" class="btn-login" routerLink="/login">Mi cuenta</button>

    <!-- User avatar (logged in) -->
    <div *ngIf="user" class="avatar-wrapper">
      <button class="avatar-btn" (click)="togglePerfil()" [attr.aria-expanded]="mostrarPerfil" aria-haspopup="true">
        <div class="avatar" [attr.title]="user.nombre">{{ user.nombre.charAt(0) }}</div>
        <div class="user-info">
          <span class="user-name">{{ user.nombre }}</span>
          <span class="user-role">Lector Explorador</span>
        </div>
      </button>
      <ul class="perfil-menu" *ngIf="mostrarPerfil">
        <li><a routerLink="/pedidos">Mis pedidos</a></li>
        <li><a routerLink="/perfil">Mi perfil</a></li>
        <li><a routerLink="/direcciones">Direcciones</a></li>
        <li><a routerLink="/pagos">Historial de pagos</a></li>
        <li>
          <button (click)="logout()">Cerrar sesión</button>
        </li>
      </ul>
    </div>
  </div>

  <!-- Mobile hamburger -->
  <button class="hamburger" aria-label="Menú" (click)="drawer.toggle()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12" />
      <line x1="3" y1="6" x2="21" y2="6" />
      <line x1="3" y1="18" x2="21" y2="18" />
    </svg>
  </button>

  <div id="cart-announce" class="visually-hidden" aria-live="polite"></div>
</nav>
