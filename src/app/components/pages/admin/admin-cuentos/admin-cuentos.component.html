<div class="cuentos-admin-container"> <!-- Changed class for clarity -->
  <h2>Gestión de Cuentos</h2>

  <div class="admin-acciones-globales">
    <button (click)="abrirModalAgregarCuento()" class="btn btn-primary">
      <i class="fas fa-plus"></i> Agregar Nuevo Cuento
    </button>
  </div>

  <div *ngIf="isLoading">Cargando cuentos...</div>
  <div class="error-mensaje" *ngIf="errorMensaje">{{ errorMensaje }}</div>
  <div class="grid-cuentos" *ngIf="!isLoading && !errorMensaje">
    <ng-container *ngFor="let cuento of cuentos">
      <app-cuento-card *ngIf="cuento" [cuento]="cuento" [isAdmin]="true" (detalle)="verDetalle(cuento.id)"
        (editar)="editarCuento($event)" (deshabilitar)="deshabilitarCuento($event)"
        class="admin-cuento-card"></app-cuento-card>
    </ng-container>
  </div>

  <div class="pagination-controls" *ngIf="totalPages > 1 && !isLoading">
    <button (click)="prevPage()" [disabled]="currentPage === 0" class="btn btn-secondary">
      &laquo; Anterior
    </button>
    <span class="page-info">Página {{ currentPage + 1 }} de {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="currentPage >= totalPages - 1" class="btn btn-secondary">
      Siguiente &raquo;
    </button>
  </div>

  <app-confirm-dialog *ngIf="cuentoParaDeshabilitar" [message]="'¿Desea dar de baja el cuento?'"
    (confirm)="confirmarDeshabilitar()" (cancel)="cancelarDeshabilitar()">
  </app-confirm-dialog>
</div>
