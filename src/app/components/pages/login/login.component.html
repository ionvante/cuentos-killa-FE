<div class="login-container">
  <div class="formulario">
    <h2>Iniciar sesión</h2>
    <app-api-error [message]="error"></app-api-error>
    <form [formGroup]="loginForm" (ngSubmit)="iniciarSesion()" aria-label="Formulario de inicio de sesión">
      <label for="correo">Correo electrónico</label>
      <input id="correo" type="email" formControlName="correo" required aria-describedby="correo-error" />
      <app-form-error [control]="loginForm.get('correo')" [isSubmitted]="isSubmitted" id="correo-error"></app-form-error>

      <label for="password">Contraseña</label>
      <input id="password" type="password" formControlName="password" required aria-describedby="password-error" />
      <app-form-error [control]="loginForm.get('password')" [isSubmitted]="isSubmitted" id="password-error"></app-form-error>

      <button type="submit" class="btn-primary">Iniciar sesión</button>
    </form>
    <p class="register-link">
      ¿No tienes cuenta?
      <a routerLink="/register" [queryParams]="returnTo && returnTo !== '/' ? { returnTo: returnTo } : null">Regístrate
        aquí</a>
    </p>
  </div>

  <div class="ilustracion">
    <img appLazyLoad="/assets/libros_killa.png" alt="Ilustración lectura" />
  </div>
</div>
